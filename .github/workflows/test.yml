name: Tests and Coverage

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Run Tests with Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov pytest-mock faker aiosqlite httpx

      - name: Create environment file
        run: |
          cat > .env << EOF
          DATABASE_URL=sqlite+aiosqlite:///./test.db
          SECRET_KEY=test-secret-key-for-ci-minimum-32-characters-long
          ACCESS_TOKEN_EXPIRE_MINUTES=60
          DB_ECHO=false
          BACKEND_CORS_ORIGINS=["http://localhost:3000"]
          EOF

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --tb=short \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: CekLoker-BackEnd

      - name: Check coverage threshold
        run: |
          coverage report --fail-under=80 || echo "ERROR: Coverage below 80% threshold"